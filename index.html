<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ralph Clarence V. Pajuleras Portfolio</title>

<style>

body {
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin: 40px auto;
  padding: 0 20px;
  color: white;
  background: black;
}

/* BACKGROUND VIDEO */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* SECTIONS */
.section {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  padding: 25px;
  margin-bottom: 25px;
  border-radius: 16px;
}

/* PROFILE */
.profile-pic {
  width: 180px;
  border-radius: 50%;
  border: 3px solid #00ffff;
  margin-bottom: 15px;
}

/* CERT GRID */
.cert-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  text-align: center;
}

.cert-card {
  cursor: pointer;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
  background: rgba(255,255,255,0.05);
}

.cert-card:hover {
  transform: scale(1.05);
}

.cert-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.cert-card p {
  padding: 10px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-content {
  width: 90%;
  height: 90%;
}

.modal iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
  color: white;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="videos/background.mp4">
</video>

<div class="overlay"></div>

<!-- ABOUT -->
<div class="section">

  <img src="images/profile.jpg" class="profile-pic">

  <h1>Ralph Clarence V. Pajuleras</h1>

</div>

<!-- CERTIFICATES -->
<div class="section">

<h2 style="text-align:center;">Certificates</h2>

<div class="cert-grid">

<!-- Network Security -->
<div class="cert-card" onclick="openPDF('certificates/NetworkSecurity.pdf')">
  <img src="images/certs/NetworkSecurity.png">
  <p>Network Security</p>
</div>

<!-- HTML & CSS -->
<div class="cert-card" onclick="openPDF('certificates/HTMLandCSS.pdf')">
  <img src="images/certs/HTMLandCSS.png">
  <p>HTML & CSS</p>
</div>

<!-- Databases -->
<div class="cert-card" onclick="openPDF('certificates/Databases.pdf')">
  <img src="images/certs/Databases.png">
  <p>Databases</p>
</div>

<!-- Cybersecurity -->
<div class="cert-card" onclick="openPDF('certificates/Cybersecurity.pdf')">
  <img src="images/certs/Cybersecurity.png">
  <p>Cybersecurity</p>
</div>

<!-- GitHub (NEW) -->
<div class="cert-card" onclick="openPDF('certificates/GitHub.pdf')">
  <img src="images/certs/GitHub.png">
  <p>GitHub</p>
</div>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <span class="close">&times;</span>
  <div class="modal-content">
    <iframe id="pdfViewer"></iframe>
  </div>
</div>

<script>

function openPDF(file) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("pdfViewer").src = file;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("pdfViewer").src = "";
}

</script>

</body>
</html>
